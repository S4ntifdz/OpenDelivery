services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432" 
    environment:
      POSTGRES_USER: Argon
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: LogisticsCore
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"

volumes:
  postgres_data:
